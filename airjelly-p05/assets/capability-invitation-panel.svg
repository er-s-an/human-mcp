<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AirJelly Capability Invitation Panel</title>
  <desc id="desc">Mock mode panel showing AirJelly suggestion, user approval, and approved toolbox endpoint with source label.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07161f"/>
      <stop offset="100%" stop-color="#02070c"/>
    </linearGradient>
    <linearGradient id="cyanCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2730"/>
      <stop offset="100%" stop-color="#0a1a1f"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="48" y="48" width="1504" height="804" rx="28" fill="#061017" stroke="#4beeff" stroke-opacity="0.35"/>
  <text x="90" y="118" fill="#8eb8c2" font-family="'Inter', 'Segoe UI', sans-serif" font-size="28" letter-spacing="2">AIRJELLY P0.5 · CAPABILITY INVITATION</text>
  <text x="90" y="182" fill="#f3feff" font-family="'Inter', 'Segoe UI', sans-serif" font-size="54" font-weight="700">Mock Mode keeps the same consent story.</text>
  <rect x="90" y="230" width="360" height="64" rx="14" fill="#123240" stroke="#4beeff" stroke-opacity="0.45"/>
  <text x="118" y="272" fill="#4beeff" font-family="'JetBrains Mono', monospace" font-size="28">AirJelly Adapter: Mock Mode</text>

  <rect x="90" y="338" width="430" height="410" rx="24" fill="url(#cyanCard)" stroke="#4beeff" stroke-opacity="0.3"/>
  <text x="126" y="396" fill="#7fe7f3" font-family="'Inter', sans-serif" font-size="24" letter-spacing="1.5">STEP 1 · SUGGESTION</text>
  <text x="126" y="456" fill="#f3feff" font-family="'Inter', sans-serif" font-size="42" font-weight="700">Focus check-in helper</text>
  <text x="126" y="512" fill="#c6e4ea" font-family="'Inter', sans-serif" font-size="28">AirJelly suggests a low-noise check-in endpoint</text>
  <text x="126" y="548" fill="#c6e4ea" font-family="'Inter', sans-serif" font-size="28">based on local-only work rhythm signals.</text>
  <rect x="126" y="606" width="190" height="58" rx="14" fill="#35ff8f"/>
  <text x="160" y="644" fill="#032111" font-family="'Inter', sans-serif" font-size="26" font-weight="700">Approve capability</text>
  <rect x="334" y="606" width="136" height="58" rx="14" fill="#162830" stroke="#8eb8c2" stroke-opacity="0.45"/>
  <text x="368" y="644" fill="#dceff3" font-family="'Inter', sans-serif" font-size="24">Not now</text>

  <path d="M560 542 H780" fill="none" stroke="#4beeff" stroke-width="4" stroke-dasharray="12 12"/>
  <polygon points="780,542 748,526 748,558" fill="#4beeff"/>
  <text x="595" y="510" fill="#7fe7f3" font-family="'JetBrains Mono', monospace" font-size="22">user approval required</text>

  <rect x="820" y="338" width="680" height="410" rx="24" fill="#0a141a" stroke="#35ff8f" stroke-opacity="0.35"/>
  <text x="860" y="396" fill="#9dffcb" font-family="'Inter', sans-serif" font-size="24" letter-spacing="1.5">STEP 2 · APPROVED TOOLBOX CARD</text>
  <text x="860" y="456" fill="#f3feff" font-family="'JetBrains Mono', monospace" font-size="40">/airjelly/focus_checkin</text>
  <text x="860" y="512" fill="#d3ecef" font-family="'Inter', sans-serif" font-size="28">Checks whether the operator wants a focus-preserving check-in</text>
  <text x="860" y="548" fill="#d3ecef" font-family="'Inter', sans-serif" font-size="28">before routing work.</text>
  <rect x="860" y="602" width="520" height="66" rx="14" fill="#112930" stroke="#4beeff" stroke-opacity="0.4"/>
  <text x="892" y="645" fill="#4beeff" font-family="'JetBrains Mono', monospace" font-size="25">Source: AirJelly Suggested, User Approved</text>
  <text x="860" y="706" fill="#9dffcb" font-family="'Inter', sans-serif" font-size="26">Only the approved capability card enters HumanMCP.</text>

  <rect x="90" y="786" width="1410" height="42" rx="12" fill="#0d1c24" stroke="#8eb8c2" stroke-opacity="0.25"/>
  <text x="120" y="814" fill="#d7eef2" font-family="'Inter', sans-serif" font-size="24">Local-first suggestion. User approval required. Capability card only. No raw-memory export claims.</text>
</svg>
