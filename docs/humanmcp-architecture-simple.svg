<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">HumanMCP demo architecture, simplified for presentation</title>
  <desc id="desc">A simple non-technical architecture diagram showing AirJelly context, HumanMCP task packet, Enter website, OpenClaw control screen, Mac stage screen, human reviewer, and stamp result.</desc>
  <defs>
    <style>
      .bg { fill: #f7f5ef; }
      .panel { fill: #ffffff; stroke: #d9d3c7; stroke-width: 2; }
      .panel-soft { fill: #fbfaf6; stroke: #d9d3c7; stroke-width: 2; }
      .title { font-family: Inter, "Noto Sans SC", Arial, sans-serif; font-size: 46px; font-weight: 750; fill: #26231f; letter-spacing: 0; }
      .subtitle { font-family: Inter, "Noto Sans SC", Arial, sans-serif; font-size: 24px; fill: #615b52; letter-spacing: 0; }
      .section { font-family: Inter, "Noto Sans SC", Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #7c5b2f; letter-spacing: 0; }
      .label { font-family: Inter, "Noto Sans SC", Arial, sans-serif; font-size: 25px; font-weight: 760; fill: #25221e; letter-spacing: 0; }
      .body { font-family: Inter, "Noto Sans SC", Arial, sans-serif; font-size: 19px; fill: #5d574f; letter-spacing: 0; }
      .small { font-family: Inter, "Noto Sans SC", Arial, sans-serif; font-size: 17px; fill: #756e64; letter-spacing: 0; }
      .pill-text { font-family: Inter, "Noto Sans SC", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #ffffff; letter-spacing: 0; }
      .arrow { fill: none; stroke: #6d6256; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
      .arrow-soft { fill: none; stroke: #9f9385; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead-soft); stroke-dasharray: 8 8; }
      .accent-blue { fill: #e8f1fb; stroke: #9bb8d4; }
      .accent-green { fill: #eaf4ec; stroke: #9fc2a7; }
      .accent-amber { fill: #fff3d8; stroke: #d7b66b; }
      .accent-red { fill: #fdeceb; stroke: #d9a4a0; }
      .accent-lilac { fill: #f0ecfa; stroke: #b9addb; }
      .accent-gray { fill: #f2f1ee; stroke: #c9c3ba; }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d6256"/>
    </marker>
    <marker id="arrowhead-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9f9385"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#2b2117" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect class="bg" width="1600" height="900"/>

  <text class="title" x="80" y="82">HumanMCP 演示架构</text>
  <text class="subtitle" x="80" y="122">一句话：AI 发现需要人类判断时，只发送最小必要信息；人类完成任务后，由舞台系统验证并展示结果。</text>

  <rect class="panel-soft" x="70" y="168" width="1460" height="620" rx="18"/>

  <text class="section" x="110" y="215">1. 发现需要人类帮助</text>
  <text class="section" x="575" y="215">2. 只发送安全任务包</text>
  <text class="section" x="1058" y="215">3. 完成、验证、展示结果</text>

  <g filter="url(#shadow)">
    <rect class="panel accent-blue" x="110" y="250" width="300" height="155" rx="14"/>
    <text class="label" x="142" y="302">AirJelly</text>
    <text class="body" x="142" y="337">观察本地工作状态</text>
    <text class="body" x="142" y="366">建议一个可调用能力</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel accent-green" x="110" y="470" width="300" height="155" rx="14"/>
    <text class="label" x="142" y="522">用户批准</text>
    <text class="body" x="142" y="557">确认这个人类能力</text>
    <text class="body" x="142" y="586">可以被 AI 调用</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel accent-amber" x="530" y="310" width="360" height="245" rx="14"/>
    <text class="label" x="565" y="365">HumanMCP 任务包</text>
    <text class="body" x="565" y="405">人类会看到：</text>
    <text class="small" x="585" y="435">产品片段、目标用户、一个问题</text>
    <text class="body" x="565" y="480">人类不会看到：</text>
    <text class="small" x="585" y="510">隐私、完整屏幕、原始记忆、凭证</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel accent-lilac" x="1015" y="250" width="330" height="155" rx="14"/>
    <text class="label" x="1048" y="302">Enter 网站</text>
    <text class="body" x="1048" y="337">发任务、收 proof</text>
    <text class="body" x="1048" y="366">保存业务结果</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel accent-blue" x="1015" y="470" width="330" height="155" rx="14"/>
    <text class="label" x="1048" y="522">Windows / OpenClaw</text>
    <text class="body" x="1048" y="557">唯一舞台控制端</text>
    <text class="body" x="1048" y="586">验证、盖章、发布状态</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel accent-gray" x="1160" y="675" width="185" height="82" rx="14"/>
    <text class="label" x="1190" y="724">Mac 展示屏</text>
    <text class="small" x="1190" y="748">只读镜像</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel accent-green" x="1380" y="310" width="115" height="245" rx="14"/>
    <text class="label" x="1410" y="368">人类</text>
    <text class="body" x="1409" y="407">回答</text>
    <text class="body" x="1409" y="438">问题</text>
    <text class="body" x="1409" y="469">提交</text>
    <text class="body" x="1409" y="500">证明</text>
  </g>

  <path class="arrow" d="M 260 405 L 260 470"/>
  <path class="arrow" d="M 410 548 C 465 548 480 433 530 433"/>
  <path class="arrow" d="M 890 433 C 945 433 955 327 1015 327"/>
  <path class="arrow" d="M 1345 327 L 1380 327"/>
  <path class="arrow" d="M 1380 498 C 1335 620 1200 655 1180 625"/>
  <path class="arrow" d="M 1180 470 L 1180 405"/>
  <path class="arrow" d="M 1180 405 L 1180 470"/>
  <path class="arrow" d="M 1180 625 L 1180 675"/>
  <path class="arrow-soft" d="M 1015 548 C 960 548 945 510 890 510"/>

  <rect x="545" y="577" width="322" height="42" rx="21" fill="#8b6f42"/>
  <text class="pill-text" x="579" y="604">隐私边界：只给最小必要信息</text>

  <rect x="1038" y="642" width="285" height="42" rx="21" fill="#4d7560"/>
  <text class="pill-text" x="1071" y="669">舞台状态：OpenClaw 单点发布</text>

  <g>
    <rect class="panel" x="110" y="815" width="1380" height="52" rx="13"/>
    <text class="body" x="143" y="848">正常流程：</text>
    <text class="small" x="245" y="848">发现能力 → 用户批准 → 生成任务包 → 人类回答 → proof 提交 → OpenClaw 验证 → 盖章/虚拟盖章 → Mac 只读展示结果</text>
  </g>
</svg>
